<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProgramJudge - 在线代码评测系统</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-code"></i>
                <span>ProgramJudge</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="active"><i class="fas fa-home"></i> 首页</a>
                <a href="problems.html"><i class="fas fa-list"></i> 题目</a>
                <a href="submit.html"><i class="fas fa-play"></i> 评测</a>
                <a href="admin/index.html"><i class="fas fa-cog"></i> 后台</a>
                <span class="user-info">
                    <i class="fas fa-user"></i> Steven1356China
                </span>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="container">
        <div class="hero">
            <h1>欢迎来到 ProgramJudge</h1>
            <p class="subtitle">一个支持 C++ 和 Python 的在线代码评测平台</p>
            <div class="hero-buttons">
                <a href="problems.html" class="btn btn-primary">
                    <i class="fas fa-list"></i> 浏览题目
                </a>
                <a href="submit.html" class="btn btn-secondary">
                    <i class="fas fa-code"></i> 开始评测
                </a>
            </div>
        </div>

        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-laptop-code"></i>
                </div>
                <h3>多语言支持</h3>
                <p>支持 C++ 和 Python 代码评测，更多语言即将上线</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <h3>快速评测</h3>
                <p>使用 Judge0 引擎，毫秒级响应，实时反馈结果</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-edit"></i>
                </div>
                <h3>易于管理</h3>
                <p>后台可轻松上传和配置题目</p>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number">2</span>
                <span class="stat-label">支持语言</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">∞</span>
                <span class="stat-label">题目数量</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">0s</span>
                <span class="stat-label">最快评测</span>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 ProgramJudge | 开发者: Steven1356China | 由 GitHub Pages 托管</p>
            <p class="footer-links">
                <a href="#"><i class="fab fa-github"></i> GitHub</a>
                <a href="#"><i class="fas fa-question-circle"></i> 帮助</a>
                <a href="#"><i class="fas fa-envelope"></i> 联系</a>
            </p>
        </div>
    </footer>

    <script src="assets/js/app.js"></script>
</body>
</html>
